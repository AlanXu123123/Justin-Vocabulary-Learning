# 推送到 main 后部署 Firebase Hosting + Cloud Functions。
# Actions Secrets: FIREBASE_TOKEN（firebase login:ci）
# 项目须先在本地执行: firebase functions:secrets:set GEMINI_API_KEY
name: Deploy Firebase Hosting and Functions

on:
  push:
    branches:
      - main
    paths:
      - 'school-courses-review/**'
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-hosting.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Deploy Hosting and Functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase deploy --only hosting,functions --non-interactive
